[build-system]
requires = ["scikit-build-core>=0.9", "nanobind>=2.0"]
build-backend = "scikit_build_core.build"

[project]
name = "fasteda"
version = "0.1.0"
description = "EDA in one command — blazing fast, C++ powered"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["eda", "data-science", "profiling", "csv", "pandas", "fast"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "rich>=13.0",
    "typer>=0.12",
]

[project.optional-dependencies]
ai = ["openai>=1.0"]
dev = ["pytest>=8.0", "pandas>=2.0"]

[project.scripts]
fasteda = "fasteda.cli:app"

[project.urls]
Homepage   = "https://github.com/prince3235/fasteda"
Repository = "https://github.com/prince3235/fasteda"

# ── scikit-build-core (C++ build) ────────────────────────────────
[tool.scikit-build]
cmake.build-type = "Release"
wheel.packages   = ["python/fasteda"]

[tool.scikit-build.cmake.define]
FETCHCONTENT_UPDATES_DISCONNECTED = "ON"