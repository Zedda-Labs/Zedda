name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ cmake ninja-build

      - name: Run Day 1 tests
        run: |
          g++ -std=c++17 -O2 -I include \
            tests/cpp/test_day1.cpp \
            -o test_day1 && ./test_day1

      - name: Run fast_float parity tests
        run: |
          g++ -std=c++17 -O2 -I include \
            tests/cpp/test_fast_float_parity.cpp \
            -o test_fast_float_parity && ./test_fast_float_parity

      - name: Run StreamReader tests
        # mmap_reader.cpp and simd_scanner.cpp are now required by stream_reader.cpp
        # simd_scanner.cpp gets -mavx2 only — runtime detection ensures it is only
        # called on CPUs that actually support AVX2 (GitHub runners use AVX2-capable
        # Skylake / Cascade Lake chips).
        run: |
          g++ -std=c++17 -O2 -I include \
            -c src/core/simd_scanner.cpp -mavx2 -o simd_scanner.o
          g++ -std=c++17 -O2 -I include \
            src/core/mmap_reader.cpp \
            src/core/stream_reader.cpp \
            tests/cpp/test_stream_reader.cpp \
            simd_scanner.o \
            -o test_stream && ./test_stream

      - name: Run ProfileBuilder tests
        run: |
          g++ -std=c++17 -O2 -I include \
            -c src/core/simd_scanner.cpp -mavx2 -o simd_scanner.o
          g++ -std=c++17 -O2 -I include \
            src/core/mmap_reader.cpp \
            src/core/stream_reader.cpp \
            src/core/profile_builder.cpp \
            tests/cpp/test_profile_builder.cpp \
            simd_scanner.o \
            -o test_profile && ./test_profile

  test-python:
    name: Test Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core nanobind cmake ninja

      - name: Install zedda with dev extras
        run: pip install -e ".[dev]"

      - name: Run Python tests
        run: pytest tests/python/