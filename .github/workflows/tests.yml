# ──────────────────────────────────────────────────────────────────────────────
# tests.yml — Main CI gate for Zedda
#
# Runs on every push to main and every PR targeting main.
# Jobs: test-cpp (gate), test-python (gate), lint (informational),
#       typecheck (informational).
# ──────────────────────────────────────────────────────────────────────────────
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. C++ TESTS — CMake-driven build and execution of ALL test binaries
  #
  #    Uses CMake (matching CMakeLists.txt) to build and run all 6 assertion-
  #    based test binaries. test_debug_crash.cpp is a manual repro script and
  #    is intentionally excluded from the automated gate.
  # ────────────────────────────────────────────────────────────────────────────
  test-cpp:
    needs: [lint, typecheck]
    # CI-07: Run C++ tests on all three platforms, not just ubuntu
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ cmake ninja-build

      - name: Configure and build all C++ tests
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run all C++ test binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          for t in test_day1 test_fast_float_parity test_stream_reader \
                   test_profile_builder test_simd_scanner test_mmap_reader \
                   test_arrow_profiler; do
            echo "::group::$t"
            ./build/$t
            echo "::endgroup::"
          done

      - name: Run all C++ test binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tests = @('test_day1','test_fast_float_parity','test_stream_reader',
                     'test_profile_builder','test_simd_scanner','test_mmap_reader',
                     'test_arrow_profiler')
          foreach ($t in $tests) {
            Write-Host "::group::$t"
            & "./build/Release/$t.exe"
            if ($LASTEXITCODE -ne 0) { throw "$t failed" }
            Write-Host "::endgroup::"
          }

  # ────────────────────────────────────────────────────────────────────────────
  # 2. PYTHON TESTS — Cross-platform × Python version matrix
  #
  #    Builds the C++ extension, then runs pytest on all Python tests.
  #    ISS-013/CI-02: Now tests across Python 3.9, 3.12, and 3.13.
  # ────────────────────────────────────────────────────────────────────────────
  test-python:
    name: Test Python (${{ matrix.os }} / ${{ matrix.python-version }})
    needs: [lint, typecheck]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.9", "3.12", "3.13", "3.14"]

    env:
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core nanobind cmake ninja

      - name: Install zedda with dev and parquet extras
        run: pip install -e ".[dev,parquet]"

      - name: Run pytest suite
        run: pytest tests/python/ -v

      - name: Run script-style test — phase3
        run: python tests/test_phase3.py

      - name: Run script-style test — ask patterns
        run: python tests/test_ask_patterns.py

  test-python-no-extras:
    name: Test Python (No Extras)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core nanobind cmake ninja

      - name: Install zedda WITHOUT parquet extra but with dev
        run: pip install -e ".[dev]"

      - name: Run optional pyarrow test
        run: pytest tests/python/test_optional_pyarrow.py -v

  # ────────────────────────────────────────────────────────────────────────────
  # 3. LINT — Ruff lint + format check (blocking merge gate)
  #
  #    Runs Ruff to enforce consistent code style. This is a hard gate:
  #    lint or format violations will fail the job and block the PR.
  #    The codebase is clean as of v0.4.4 (BUG-05 resolved extern/ exclusion).
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ────────────────────────────────────────────────────────────────────────────
  # 4. TYPECHECK — mypy (informational, does not block merge)
  #
  #    Type checks the zedda package. Uses continue-on-error because the
  #    C++ extension (fasteda_core) has no type stubs and the existing
  #    codebase has untyped patterns. Remove continue-on-error once stubs
  #    are added and all type errors are resolved.
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install mypy and stubs
        run: pip install mypy types-requests

      - name: Run mypy
        run: mypy python/zedda/ --ignore-missing-imports
        continue-on-error: true  # TODO: make blocking once mypy baseline is established
        # TODO(owner): 16 pre-existing type errors found on first mypy run (PR #24),
        # mostly implicit-Optional patterns (e.g. `def f(x: int = None)` needs to be
        # `def f(x: int | None = None)`). Triage and fix these, then remove
        # continue-on-error to make mypy a real merge gate.

  benchmark:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    needs: [test-cpp, test-python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install Zedda
        run: pip install -e ".[dev,parquet]"
      - name: Generate benchmark fixture
        run: |
          python -c "
          import pandas as pd, numpy as np
          n = 100_000
          df = pd.DataFrame({
              'id': range(n),
              'amount': np.random.exponential(1000, n),
              'category': np.random.choice(['A','B','C'], n),
              'value': np.random.normal(500, 100, n),
          })
          df.to_csv('/tmp/bench_100k.csv', index=False)
          "
      - name: Run benchmark and check threshold
        run: |
          python -c "
          import zedda as zd, time
          start = time.perf_counter()
          zd.scan('/tmp/bench_100k.csv')
          elapsed_ms = (time.perf_counter() - start) * 1000
          print(f'Benchmark: 100K rows scanned in {elapsed_ms:.0f}ms')
          threshold_ms = 500
          if elapsed_ms > threshold_ms:
              raise SystemExit(
                  f'REGRESSION: scan took {elapsed_ms:.0f}ms, '
                  f'threshold is {threshold_ms}ms'
              )
          print('Benchmark passed.')
          "

  # ── Status Checks Consolidation (Open Source Best Practice) ──
  # These jobs don't run any code. They wait for the matrix jobs to finish
  # and report a single pass/fail status with the exact name branch protection expects.
  # This keeps the PR UI clean and prevents branch protection from breaking when the matrix changes.
  test-cpp-status:
    name: test-cpp
    runs-on: ubuntu-latest
    needs: [test-cpp]
    if: always()
    steps:
      - name: Check test-cpp matrix status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            exit 1
          fi

  test-python-ubuntu-status:
    name: Test Python (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: [test-python]
    if: always()
    steps:
      - name: Check test-python matrix status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            exit 1
          fi

  test-python-macos-status:
    name: Test Python (macos-14)
    runs-on: ubuntu-latest
    needs: [test-python]
    if: always()
    steps:
      - name: Check test-python matrix status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            exit 1
          fi

  test-python-windows-status:
    name: Test Python (windows-latest)
    runs-on: ubuntu-latest
    needs: [test-python]
    if: always()
    steps:
      - name: Check test-python matrix status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            exit 1
          fi