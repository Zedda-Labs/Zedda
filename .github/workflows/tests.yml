# ──────────────────────────────────────────────────────────────────────────────
# tests.yml — Main CI gate for Zedda
#
# Runs on every push to main and every PR targeting main.
# Jobs: test-cpp (gate), test-python (gate), lint (informational),
#       typecheck (informational).
# ──────────────────────────────────────────────────────────────────────────────
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. C++ TESTS — CMake-driven build and execution of ALL test binaries
  #
  #    Uses CMake (matching CMakeLists.txt) to build and run all 6 assertion-
  #    based test binaries. test_debug_crash.cpp is a manual repro script and
  #    is intentionally excluded from the automated gate.
  # ────────────────────────────────────────────────────────────────────────────
  test-cpp:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ cmake ninja-build

      - name: Configure and build all C++ tests
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run all C++ test binaries
        run: |
          for t in test_day1 test_fast_float_parity test_stream_reader \
                   test_profile_builder test_simd_scanner test_mmap_reader; do
            echo "::group::$t"
            ./build/$t
            echo "::endgroup::"
          done

  # ────────────────────────────────────────────────────────────────────────────
  # 2. PYTHON TESTS — Cross-platform × Python 3.13
  #
  #    Builds the C++ extension, then runs pytest on all Python tests.
  # ────────────────────────────────────────────────────────────────────────────
  test-python:
    name: Test Python (${{ matrix.os }})
    needs: [lint, typecheck]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    env:
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core nanobind cmake ninja

      - name: Install zedda with dev extras
        run: pip install -e ".[dev]"

      - name: Run pytest suite
        run: pytest tests/python/ -v

      - name: Run script-style test — phase3
        run: python tests/test_phase3.py

      - name: Run script-style test — ask patterns
        run: python tests/test_ask_patterns.py

  # ────────────────────────────────────────────────────────────────────────────
  # 3. LINT — Ruff lint + format check (blocking merge gate)
  #
  #    Runs Ruff to enforce consistent code style. This is a hard gate:
  #    lint or format violations will fail the job and block the PR.
  #    The codebase is clean as of v0.4.4 (BUG-05 resolved extern/ exclusion).
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ────────────────────────────────────────────────────────────────────────────
  # 4. TYPECHECK — mypy (informational, does not block merge)
  #
  #    Type checks the zedda package. Uses continue-on-error because the
  #    C++ extension (fasteda_core) has no type stubs and the existing
  #    codebase has untyped patterns. Remove continue-on-error once stubs
  #    are added and all type errors are resolved.
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install mypy and stubs
        run: pip install mypy types-requests

      - name: Run mypy
        run: mypy python/zedda/ --ignore-missing-imports
        continue-on-error: true  # TODO: make blocking once mypy baseline is established
        # TODO(owner): 16 pre-existing type errors found on first mypy run (PR #24),
        # mostly implicit-Optional patterns (e.g. `def f(x: int = None)` needs to be
        # `def f(x: int | None = None)`). Triage and fix these, then remove
        # continue-on-error to make mypy a real merge gate.