name: Reusable Tests

on:
  workflow_call:
    inputs:
      run-cpp:
        type: boolean
        default: true
      run-python:
        type: boolean
        default: true

jobs:
  test-cpp:
    if: inputs.run-cpp
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ cmake ninja-build

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja -y

      - name: Configure and build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run C++ tests (Unix)
        if: runner.os != 'Windows'
        run: |
          for t in test_day1 test_fast_float_parity test_stream_reader \
                   test_profile_builder test_simd_scanner test_mmap_reader \
                   test_arrow_profiler test_hyperloglog; do
            echo "::group::$t"
            ./build/$t
            echo "::endgroup::"
          done

      - name: Run C++ tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tests = @('test_day1','test_fast_float_parity','test_stream_reader',
                     'test_profile_builder','test_simd_scanner','test_mmap_reader',
                     'test_arrow_profiler','test_hyperloglog')
          foreach ($t in $tests) {
            Write-Host "::group::$t"
            & "./build/Release/$t.exe"
            if ($LASTEXITCODE -ne 0) { throw "$t failed" }
            Write-Host "::endgroup::"
          }

  test-python:
    if: inputs.run-python
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.9", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    env:
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y g++

      - name: Install zedda
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core nanobind cmake ninja
          pip install -e ".[dev,parquet]"

      - name: Run pytest
        run: pytest tests/python/ -v

      - name: Run script tests
        run: |
          python tests/test_phase3.py
          python tests/test_ask_patterns.py

  tests-status:
    name: Tests Status
    needs: [test-cpp, test-python]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check all test results
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            echo "::error::One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed"
