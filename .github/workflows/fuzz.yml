name: Fuzzing

on:
  schedule:
    - cron: '0 4 * * *'  # nightly, fuzzing is inherently a background activity
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-csv-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {submodules: recursive}

      - name: Build fuzzer
        run: |
          cmake -B build-fuzz -DCMAKE_BUILD_TYPE=Debug -DZEDDA_BUILD_FUZZERS=ON \
            -DCMAKE_CXX_COMPILER=clang++
          cmake --build build-fuzz --target fuzz_csv_parser

      - name: Seed corpus
        run: |
          mkdir -p corpus
          printf 'a,b,c\n1,2,3\n' > corpus/seed1.csv
          printf '"hello","wor""ld","test"\n' > corpus/seed2.csv

      - name: Run fuzzer for 10 minutes
        id: fuzz
        run: |
          ./build-fuzz/fuzz_csv_parser corpus/ -max_total_time=600 -print_final_stats=1
        continue-on-error: true

      - name: Upload crash artifacts if any
        # FIX CI-C2: Previously `if: failure()` never fired because the
        # fuzzer step had continue-on-error: true (conclusion=success).
        # Use always() + steps.fuzz.outcome to detect the actual outcome.
        if: always() && steps.fuzz.outcome == 'failure'
        # FIX CI-H2: Use the same SHA-pinned v4.6.1 actions/upload-artifact
        # used elsewhere — the previous SHA `043fb46d1a...` with comment
        # `# v7.0.1` did not correspond to any official v7 release.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: crash-*
          retention-days: 30
