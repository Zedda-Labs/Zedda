# ──────────────────────────────────────────────────────────────────────────────
# codeql.yml — GitHub CodeQL static analysis for C++ and Python
#
# Runs on PRs, pushes to main, and weekly schedule.
# Uses MANUAL build steps (not Autobuild) because Autobuild cannot handle
# CMake + nanobind + git submodule projects reliably.
# ──────────────────────────────────────────────────────────────────────────────
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    # Weekly Monday 06:00 UTC — catches new vulnerability patterns
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [cpp, python]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e8e8e51caba890f74f97e228d00b0b81b666ee4c # v3
        with:
          languages: ${{ matrix.language }}

      # ── Manual C++ build (Autobuild WILL fail on this project) ──
      - name: Build C++ (manual)
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ cmake ninja-build
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e8e8e51caba890f74f97e228d00b0b81b666ee4c # v3
        with:
          category: "/language:${{ matrix.language }}"
