# ──────────────────────────────────────────────────────────────────────────────
# docker_publish.yml — Build, test, scan, and publish Docker images
#
# Publishes to both GHCR (via GITHUB_TOKEN — zero secrets) and Docker Hub
# (via scoped PAT). Multi-arch builds (arm64) run ONLY on tag pushes to
# conserve CI minutes (QEMU emulation is 20-40 min for SIMD C++ code).
# ──────────────────────────────────────────────────────────────────────────────
name: Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # Required for GHCR publishing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release publish mid-flight

jobs:
  docker:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7
        with:
          submodules: recursive

      # ── Multi-arch: QEMU for arm64 (tag pushes only) ──
      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.4.0

      # ── Registry logins ──
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Metadata for tagging ──
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.5.1
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/zedda
            ${{ secrets.DOCKER_USERNAME }}/zedda
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      # ── Build (no push yet — we test first) ──
      - name: Build Docker image (amd64 only, for testing)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          push: false
          load: true
          tags: zedda:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Smoke test: verify the image works ──
      - name: Smoke test Docker image
        run: |
          docker run --rm zedda:test python -c "import zedda; print(f'zedda {zedda.__version__} OK')"

      # ── Push to registries ──
      # On tag push: build multi-arch (amd64 + arm64) and push
      # On workflow_dispatch: build amd64 only and push
      - name: Build and push (multi-arch on tag, amd64 on dispatch)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          push: true
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
