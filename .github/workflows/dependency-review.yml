# ──────────────────────────────────────────────────────────────────────────────
# dependency-review.yml — Block PRs that introduce vulnerable dependencies
#
# Lightweight check (~15s) that compares the dependency manifest before and
# after the PR to detect newly added packages with known CVEs.
# ──────────────────────────────────────────────────────────────────────────────
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4.6.0
        # FIX CI-H3: Removed continue-on-error: true — critical-CVE PRs must
        # be blocked. Lowered threshold from 'critical' to 'high' to catch
        # more issues. NOTE: requires Dependency Graph to be enabled in
        # Settings -> Code security and analysis.
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
