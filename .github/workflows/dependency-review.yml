# ──────────────────────────────────────────────────────────────────────────────
# dependency-review.yml — Block PRs that introduce vulnerable dependencies
#
# Lightweight check (~15s) that compares the dependency manifest before and
# after the PR to detect newly added packages with known CVEs.
# ──────────────────────────────────────────────────────────────────────────────
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: AGPL-3.0, GPL-3.0
          comment-summary-in-pr: always
