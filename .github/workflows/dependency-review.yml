# ──────────────────────────────────────────────────────────────────────────────
# dependency-review.yml — Block PRs that introduce vulnerable dependencies
#
# Lightweight check (~15s) that compares the dependency manifest before and
# after the PR to detect newly added packages with known CVEs.
# ──────────────────────────────────────────────────────────────────────────────
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.6.0
        # TODO(owner): remove continue-on-error once Dependency Graph is enabled in
        # Settings -> Code security and analysis -> Dependency graph. This check is a
        # real security gate and should be made required again after that setting is on.
        continue-on-error: true  # TODO: make blocking once dep audit is clean
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always
