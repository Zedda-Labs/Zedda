# ──────────────────────────────────────────────────────────────────────────────
# build_wheels.yml — Build & Publish wheels to PyPI
#
# Triggered on version tags (v*.*.*) and manual dispatch.
# Pipeline: build wheels → build sdist → TestPyPI → PyPI (tag only)
# ──────────────────────────────────────────────────────────────────────────────
name: Build & Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release build mid-flight

jobs:

  build_wheels:
    name: Build ${{ matrix.os }} (${{ matrix.cibw_python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        cibw_python: ["cp39"]
        include:
          # Linux x86_64 + ARM64
          - os: ubuntu-latest
            cibw_archs: "x86_64 aarch64"
            manylinux_image: "manylinux_2_28"
          - os: ubuntu-latest
            cibw_archs: "x86_64 aarch64"
            manylinux_image: "manylinux2014"
            wheel_suffix: "-legacy"
          # macOS Apple Silicon (ARM64) — macos-14 runner
          - os: macos-14
            cibw_archs: "arm64"
          # macOS Intel (x86_64) — macos-13 runner  
          - os: macos-13
            cibw_archs: "x86_64"
          # Windows AMD64
          - os: windows-latest
            cibw_archs: "AMD64"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: ccache setup
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: ${{ matrix.os }}-${{ matrix.cibw_python }}
        continue-on-error: true

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3

      - name: Build wheels
        run: |
          python -c "import os; os.makedirs('.ccache', exist_ok=True)"
          python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "${{ matrix.cibw_python }}-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 cp313t-*"
          CIBW_ARCHS_LINUX: "${{ matrix.cibw_archs }}"
          CIBW_ARCHS_MACOS: "${{ matrix.cibw_archs }}"
          # NOTE: pyarrow has NO win_arm64 prebuilt wheel in any version.
          # Zedda itself builds fine on win_arm64 because pyarrow is optional.
          # Users who need Parquet on Windows ARM64 must build pyarrow from source.
          CIBW_ARCHS_WINDOWS: "${{ matrix.cibw_archs }}"
          # FIX M-03: manylinux2014 (CentOS 7) reached EOL 2024-06-30.
          # Migrate to manylinux_2_28 (AlmaLinux 8) for both arches.
          CIBW_MANYLINUX_X86_64_IMAGE: "${{ matrix.manylinux_image || 'manylinux_2_28' }}"
          CIBW_MANYLINUX_AARCH64_IMAGE: "${{ matrix.manylinux_image || 'manylinux_2_28' }}"
          CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
          CIBW_MUSLLINUX_AARCH64_IMAGE: musllinux_1_2
          CIBW_BUILD_FRONTEND: "build"
          # FIX CI-H7: Smoke-test every wheel before it ships to PyPI.
          # Catches missing symbols, ABI breaks, and import errors.
          CIBW_TEST_COMMAND: "python -c \"import zedda; assert zedda.__version__; print(zedda.__version__)\""
          # SEC-D04: Pin all build dependencies to exact versions
          # to prevent supply chain attacks via compromised build tools.
          CIBW_BEFORE_BUILD_LINUX: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          CIBW_BEFORE_BUILD_MACOS: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          # Install ccache inside cibuildwheel build environments
          CIBW_BEFORE_ALL_LINUX: "yum install -y ccache || apt-get install -y ccache || apk add ccache || true"
          CIBW_BEFORE_ALL_MACOS: "export HOMEBREW_NO_REQUIRE_TAP_TRUST=1; brew install ccache || true"
          CIBW_BEFORE_ALL_WINDOWS: "choco install ccache -y || true"
          # ccache env for Linux containers — mount host cache dir into container
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=/host/ccache
          CIBW_CONTAINER_ENGINE: "docker; create_args: --volume ${{ github.workspace }}/.ccache:/host/ccache"
          # ccache env for macOS/Windows (native builds, no containers)
          CIBW_ENVIRONMENT_MACOS: "CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache"
          CIBW_ENVIRONMENT_WINDOWS: "CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache"

      - name: Test abi3 wheel on Python 3.13
        run: |
          pip install --find-links=./wheelhouse zedda --no-index
          python -c "import zedda; print(zedda.__version__)"
        env:
          PIP_FIND_LINKS: ./wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_python }}${{ matrix.wheel_suffix }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build scikit-build-core nanobind

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  publish_test:
    name: Publish to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # FIX CI-C1: REMOVED continue-on-error: true — it defeated the
    # publish_pypi safety gate by forcing publish_test's conclusion to
    # 'success' even on failure. Now a TestPyPI failure correctly blocks
    # the PyPI publish.
    environment:
      name: testpypi
      url: https://test.pypi.org/project/zedda/
    permissions:
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Download all wheels
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          name: sdist
          path: dist/

      - name: Publish to TestPyPI
        # FIX CI-H1: Pin to a specific commit SHA instead of the floating
        # release/v1 branch — prevents supply-chain attack via compromised branch.
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.10.3
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── FIX C-05 / ISS-003: publish_pypi now depends on publish_test ──
  # The comment below previously claimed this was fixed, but the actual
  # needs: list still omitted publish_test — a "claimed done vs actually
  # done" gap. Now correctly gated.
  publish_pypi:
    name: Publish to PyPI
    needs: [publish_test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # TODO(owner): this job will not run until the "pypi-production" GitHub
    # Environment is created in repo Settings with at least one required reviewer.
    # See the manual setup instructions in this PR's description / the hardening
    # doc for exact steps — this cannot be configured via workflow YAML alone.
    environment:
      name: pypi-production
      url: https://pypi.org/project/zedda/
    # FIX CI-M19: publish_pypi previously had both id-token:write AND
    # contents:write — overly broad for a publish step. contents:write is
    # only needed by the softprops/action-gh-release step. Split into a
    # separate github_release job below to enforce least privilege.
    permissions:
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v') && needs.publish_test.result == 'success'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Download all wheels
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        # FIX CI-H1: SHA-pinned to prevent supply-chain attack.
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.10.3

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      # SEC-09: Generate Software Bill of Materials (SBOM)
      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.18.0
        with:
          path: dist/
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*
            dist/SHA256SUMS.txt
            dist/sbom.spdx.json

  # FIX CI-M19: Split GitHub release into its own job with only contents:write.
  github_release:
    name: Attach artifacts to GitHub Release
    needs: [publish_pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Download all wheels
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          name: sdist
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.18.0
        with:
          path: dist/
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*
            dist/SHA256SUMS.txt
            dist/sbom.spdx.json