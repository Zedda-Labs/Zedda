# ──────────────────────────────────────────────────────────────────────────────
# build_wheels.yml — Build & Publish wheels to PyPI
#
# Triggered on version tags (v*.*.*) and manual dispatch.
# Pipeline: build wheels → build sdist → TestPyPI → PyPI (tag only)
# ──────────────────────────────────────────────────────────────────────────────
name: Build & Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release build mid-flight

jobs:

  build_wheels:
    name: Build ${{ matrix.os }} (${{ matrix.cibw_python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]
        cibw_python: ["cp39", "cp310", "cp311", "cp312", "cp313"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "${{ matrix.cibw_python }}-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BUILD_FRONTEND: "build"
          # SEC-D04: Pin all build dependencies to exact versions
          # to prevent supply chain attacks via compromised build tools.
          CIBW_BEFORE_BUILD_LINUX: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          CIBW_BEFORE_BUILD_MACOS: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_python }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build scikit-build-core nanobind

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  publish_test:
    name: Publish to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── FIX C-05: publish_pypi now depends on publish_test ──
  # Previously this only depended on [build_wheels, build_sdist], meaning
  # production publish could proceed even if TestPyPI upload failed.
  publish_pypi:
    name: Publish to PyPI
    needs: [publish_test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1