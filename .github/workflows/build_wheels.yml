# ──────────────────────────────────────────────────────────────────────────────
# build_wheels.yml — Build & Publish wheels to PyPI
#
# Triggered on version tags (v*.*.*) and manual dispatch.
# Pipeline: build wheels → build sdist → TestPyPI → PyPI (tag only)
# ──────────────────────────────────────────────────────────────────────────────
name: Build & Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release build mid-flight

jobs:

  build_wheels:
    name: Build ${{ matrix.os }} (${{ matrix.cibw_python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]
        cibw_python: ["cp39", "cp310", "cp311", "cp312", "cp313"]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.1.0
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: ccache setup
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: ${{ matrix.os }}-${{ matrix.cibw_python }}
        continue-on-error: true

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "${{ matrix.cibw_python }}-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BUILD_FRONTEND: "build"
          # SEC-D04: Pin all build dependencies to exact versions
          # to prevent supply chain attacks via compromised build tools.
          CIBW_BEFORE_BUILD_LINUX: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          CIBW_BEFORE_BUILD_MACOS: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install cmake==3.30.5 ninja==1.11.1.1 scikit-build-core==0.10.7 nanobind==2.4.0
          # Install ccache inside cibuildwheel build environments
          CIBW_BEFORE_ALL_LINUX: "yum install -y ccache || apt-get install -y ccache || true"
          CIBW_BEFORE_ALL_MACOS: "brew install ccache || true"
          CIBW_BEFORE_ALL_WINDOWS: "choco install ccache -y || true"
          # ccache env for Linux containers — mount host cache dir into container
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=/host/ccache
          CIBW_CONTAINER_ENGINE: "docker; create_args: --volume {project}/.ccache:/host/ccache"
          # ccache env for macOS/Windows (native builds, no containers)
          CIBW_ENVIRONMENT_MACOS: "CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache"
          CIBW_ENVIRONMENT_WINDOWS: "CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache"

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1.3.7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_python }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          submodules: recursive

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.1.0
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build scikit-build-core nanobind

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1.3.7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  publish_test:
    name: Publish to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          name: sdist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── FIX C-05: publish_pypi now depends on publish_test ──
  # Previously this only depended on [build_wheels, build_sdist], meaning
  # production publish could proceed even if TestPyPI upload failed.
  publish_pypi:
    name: Publish to PyPI
    needs: [publish_test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # TODO(owner): this job will not run until the "pypi-production" GitHub
    # Environment is created in repo Settings with at least one required reviewer.
    # See the manual setup instructions in this PR's description / the hardening
    # doc for exact steps — this cannot be configured via workflow YAML alone.
    environment:
      name: pypi-production
      url: https://pypi.org/project/zedda/
    permissions:
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*
            dist/SHA256SUMS.txt